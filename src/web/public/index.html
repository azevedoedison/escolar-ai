<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolar AI - Seu Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 85vh;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }

    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { justify-content: flex-end; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .message.bot .avatar { background: #667eea; }
    .message.user .avatar { background: #10a37f; }

    .bubble {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .message.bot .bubble {
      background: white;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: #10a37f;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
    }

    input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #667eea; }

    button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .suggestion {
      padding: 8px 16px;
      background: #f0f0f0;
      border: none;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .suggestion:hover { background: #e0e0e0; }

    .powered {
      text-align: center;
      padding: 12px;
      font-size: 0.75rem;
      color: #888;
      background: #f8f9fa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 Escolar AI</h1>
      <p>Seu amigo para aprender brincando!</p>
    </div>

    <div class="chat" id="chat">
      <div class="message bot">
        <div class="avatar">🤖</div>
        <div class="bubble">
          Oi! Eu sou a <strong>Escolar AI</strong>! 🎉
          <br><br>
          Posso ajudar você com:
          <br>• 🔬 Ciências
          <br>• 📐 Matemática
          <br>• 🌍 História
          <br>• 📖 Português
          <br><br>
          O que você quer aprender hoje? 😊
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="suggestions">
        <button class="suggestion" onclick="ask('O que é fotossíntese?')">🔬 Fotossíntese</button>
        <button class="suggestion" onclick="ask('Como calcular área do triângulo?')">📐 Área triângulo</button>
        <button class="suggestion" onclick="ask('Quem descobriu o Brasil?')">🌍 Descoberta</button>
      </div>
      <div class="input-wrapper">
        <input type="text" id="input" placeholder="Pergunte algo sobre escola..." onkeypress="handleKey(event)">
        <button id="send" onclick="send()">Enviar</button>
      </div>
    </div>

    <div class="powered">
      🤖 Powered by OpenRouter + Ollama | Guard Rails Ativo 🛡️
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'bot'}`;
      div.innerHTML = `
        <div class="avatar">${isUser ? '👤' : '🤖'}</div>
        <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.id = 'typing';
      div.className = 'message bot';
      div.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        
        removeTyping();
        addMessage(data.response || 'Ops! Algo deu errado.', false);
      } catch (err) {
        removeTyping();
        addMessage('🤔 Ops! Tente novamente.', false);
      }

      sendBtn.disabled = false;
      input.focus();
    }

    function ask(text) {
      input.value = text;
      send();
    }

    function handleKey(e) {
      if (e.key === 'Enter') send();
    }

    input.focus();
  </script>
</body>
</html>
